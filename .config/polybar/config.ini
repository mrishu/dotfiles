; -- BARS --
; ‚Ėą
; ‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ    ‚ĖĄ‚ĖĄ‚ĖĄ    ‚ĖĄ ‚ĖĄ‚ĖĄ   ‚ĖĄ‚ĖĄ‚ĖĄ
; ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą  ‚ĖÄ   ‚Ėą   ‚Ėą‚ĖÄ  ‚ĖÄ ‚Ėą   ‚ĖÄ
; ‚Ėą   ‚Ėą  ‚ĖĄ‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą   ‚Ėą      ‚ĖÄ‚ĖÄ‚ĖÄÓěď
; ‚Ėą‚Ėą‚ĖĄ‚Ėą‚ĖÄ  ‚ĖÄ‚ĖĄ‚ĖĄ‚ĖÄ‚Ėą   ‚Ėą     ‚ĖÄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖÄ

[bar/mybar]
enable-ipc=true

height = 28
width = 100%

border-size = 0
border-color = ${colors.background}

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = JetBrains Mono:style=Bold:size=12:antialias=true:hinting=true;2
font-1 = Font Awesome 6 Free Regular:size=14:antialias=true:hinting=true;4
font-2 = Font Awesome 6 Free Solid:size=14:antialias=true:hinting=true;4
font-3 = JetBrainsMono Nerd Font:style=Bold:pixelsize=18:antialias=true:hinting=true;5

wm-restack = bspwm

cursor-click = pointer
cursor-scroll = default

modules-left = launcher bspwm bspwm-mode
modules-center = clockicon time date day
modules-right = pulseaudio backlight memory info-redshift-temp battery powermenu

tray-position = right
tray-padding = 2

; --GLOBAL SETTINGS --
;        ‚ĖÄ‚ĖÄ‚Ėą           ‚Ėą             ‚ĖÄ‚ĖÄ‚Ėą
;  ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ    ‚Ėą     ‚ĖĄ‚ĖĄ‚ĖĄ   ‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ    ‚ĖĄ‚ĖĄ‚ĖĄ     ‚Ėą
; ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą    ‚Ėą    ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą  ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą  ‚ĖÄ   ‚Ėą    ‚Ėą
; ‚Ėą   ‚Ėą    ‚Ėą    ‚Ėą   ‚Ėą  ‚Ėą   ‚Ėą  ‚ĖĄ‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą    ‚Ėą
; ‚ĖÄ‚Ėą‚ĖĄ‚ĖÄ‚Ėą    ‚ĖÄ‚ĖĄ‚ĖĄ  ‚ĖÄ‚Ėą‚ĖĄ‚Ėą‚ĖÄ  ‚Ėą‚Ėą‚ĖĄ‚Ėą‚ĖÄ  ‚ĖÄ‚ĖĄ‚ĖĄ‚ĖÄ‚Ėą    ‚ĖÄ‚ĖĄ‚ĖĄ
;  ‚ĖĄ  ‚Ėą
;   ‚ĖÄ‚ĖÄ

[settings]
screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0

; -- MODULES --
;                   ‚Ėą         ‚ĖÄ‚ĖÄ‚Ėą
; ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ   ‚ĖĄ‚ĖĄ‚ĖĄ    ‚ĖĄ‚ĖĄ‚ĖĄ‚Ėą  ‚ĖĄ   ‚ĖĄ    ‚Ėą     ‚ĖĄ‚ĖĄ‚ĖĄ    ‚ĖĄ‚ĖĄ‚ĖĄ
; ‚Ėą ‚Ėą ‚Ėą  ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą  ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą  ‚Ėą   ‚Ėą    ‚Ėą    ‚Ėą‚ĖÄ  ‚Ėą  ‚Ėą   ‚ĖÄ
; ‚Ėą ‚Ėą ‚Ėą  ‚Ėą   ‚Ėą  ‚Ėą   ‚Ėą  ‚Ėą   ‚Ėą    ‚Ėą    ‚Ėą‚ĖÄ‚ĖÄ‚ĖÄ‚ĖÄ   ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĄ
; ‚Ėą ‚Ėą ‚Ėą  ‚ĖÄ‚Ėą‚ĖĄ‚Ėą‚ĖÄ  ‚ĖÄ‚Ėą‚ĖĄ‚Ėą‚Ėą  ‚ĖÄ‚ĖĄ‚ĖĄ‚ĖÄ‚Ėą    ‚ĖÄ‚ĖĄ‚ĖĄ  ‚ĖÄ‚Ėą‚ĖĄ‚ĖĄ‚ĖÄ  ‚ĖÄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖÄ

; -- MODULES LFET --
[module/launcher]
type = custom/text
content = ÔĄĶ
content-background = ${colors.green}
content-foreground = ${colors.black}
content-padding = 2
click-left = rofi -modi drun -show drun -config ~/.config/rofi/rofidmenu.rasi -hover-select -me-select-entry '' -me-accept-entry MousePrimary

[module/bspwm]
type = internal/bspwm
format = <label-state>
index-sort = true

enable-click = true
reverse-scroll = true
enable-scroll = true

label-focused = %name%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.grey}
label-focused-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.grey}
label-empty-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.blue}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.black}
label-urgent-background = ${colors.red}
label-urgent-padding = 1

format-padding = 1

[module/bspwm-mode]
type = custom/script
exec = ~/.config/polybar/scripts/bspwm-mode.sh
tail = true
format-foreground = ${colors.magenta}
click-left = bspc desktop -l next; bspc wm -g > /tmp/bspwm.fifo

; -- MODULES CENTER --
[module/clockicon]
type = custom/text
content = ÔÄó
content-foreground = ${colors.red2}

[module/time]
type = internal/date
interval = 5
format = <label>
format-foreground = ${colors.yellow2}
time = %I:%M %p
label = " %time% "

[module/date]
type = internal/date
interval = 5
format = <label>
format-foreground = ${colors.green2}
date = "%b %d "
label = %date%

[module/day]
type = internal/date
interval = 5
format = <label>
format-foreground = ${colors.blue2}
date = (%a)
label = %date%

; -- MODULES RIGHT --
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

enable-scroll = true
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.blue}
format-volume-padding = 1

label-muted = Ôö© Muted
format-muted-foreground = ${colors.red2}
format-muted-padding = 1

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

click-right = pavucontrol

[module/backlight]
type = internal/backlight
card = amdgpu_bl1

enable-scroll = true
interval = 5

format = <ramp> <label>
format-foreground = ${colors.yellow2}
format-padding = 1

label = %percentage%%

ramp-0 = ÔÜÖ

[module/memory]
type = internal/memory
interval = 5
label = Ôčõ %gb_used%
format = <label>
format-padding = 1
format-foreground = ${colors.magenta}

[module/info-redshift-temp]
type = custom/script
exec = ~/.config/polybar/scripts/info-redshift-temp.sh
interval = 60
format-padding = 1

[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD

format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.blue}
format-charging-padding = 1

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${colors.red}
format-discharging-padding = 1

format-full = <ramp-capacity> <label-full>
format-full-foreground = ${colors.green}
format-full-padding = 1

label-charging = Charging %percentage%%
label-discharging = Discharging %percentage%%

label-full = Full

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

[module/powermenu]
type = custom/text
content = ÔÄĎ
content-background = ${colors.cyan2}
content-foreground = ${colors.black}
content-padding = 1
click-left = rofi -show power-menu -modi power-menu:~/.config/bspwm/scripts/rofi-power-menu -hover-select -me-select-entry '' -me-accept-entry MousePrimary -no-fixed-num-lines
